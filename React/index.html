<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.26.3/babel.js" integrity="sha512-zUYFpDCju9pzVcCS/NHRnaTcHlxn5EqoFljrpgJCIU2qG5NAl4+R+a5iZFiAq9ejM+D7D4Mp2Qqg3u0Y5bOKNA==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <title>React</title>
</head>
<body>
    <h3>React Application</h3>
    <div id="app1"></div>
    <div id="app2"></div>
    <div id="app3"></div>
    <div id="app4"></div>

    <script type="text/babel">
        //create an element: <div>Hello React</div>
        const element1 = React.createElement("div", null, "Hello React");
        ReactDOM.createRoot(document.getElementById("app1")).render(element1);

        //create an element: <div><h4>Welcome to the React Training</h4></div>
        const element2 = React.createElement("div", null, 
                                React.createElement("h4", null, 
                                        "Welcome to the React Training"));
        ReactDOM.createRoot(document.getElementById("app2")).render(element2);

        //create an element: <div><h4>Hello jSX</h4></div>
        ReactDOM.createRoot(document.getElementById("app3"))
                                            .render(<div><h4>Hello JSX</h4></div>);

        // component(function/class)
        function HelloComponent(){
            // return the view(jsx)
            return (
                <div>
                    <h4>Hello Component </h4>
                    <p>This is a simple component</p>
                </div>
            )
        }
        ReactDOM.createRoot(document.getElementById("app4"))
                                                .render(<HelloComponent/>)


    </script>

</body>
</html>
